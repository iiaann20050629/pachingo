<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pacheco Neo V6.2 - 手機自動適配版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        /* [核心防護] 徹底禁用系統選單與長按 */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #0a0a20 0%, #030308 100%);
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #ui-header {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 100;
            pointer-events: none;
        }

        .panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid rgba(0,242,255,0.3);
            text-align: center;
            min-width: 80px;
        }

        .stat-val { font-size: 1.2rem; font-weight: bold; color: #f1c40f; }

        /* [修正] 手機端自動定位佈局 */
        #left-box-wrapper {
            position: absolute;
            left: 10px;
            bottom: 20px;
            z-index: 100;
            transform: scale(0.9);
            transform-origin: left bottom;
        }

        #right-controls-wrapper {
            position: absolute;
            right: 10px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #333;
            transform: scale(0.9);
            transform-origin: right bottom;
        }

        /* 針對較大螢幕調整 UI 位置 */
        @media (min-width: 600px) {
            #left-box-wrapper { left: calc(50% - 250px); top: 60%; bottom: auto; transform: scale(1); }
            #right-controls-wrapper { right: calc(50% - 280px); top: 60%; bottom: auto; transform: scale(1); }
        }

        input {
            width: 50px;
            background: #111;
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 8px;
            text-align: center;
            font-size: 1.2rem;
            border-radius: 5px;
        }

        button {
            padding: 12px 18px;
            background: linear-gradient(135deg, #00d2ff, #0072ff);
            border: none;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:active { transform: scale(0.9); }
        #reset-btn { background: #ff4757; display: none; }

        #msg {
            position: absolute;
            top: 35%;
            width: 100%;
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            pointer-events: none;
            opacity: 0;
            z-index: 200;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="game-container">
    <div id="ui-header">
        <div class="panel">💎 彈珠 <div id="balance-text" class="stat-val">10</div></div>
        <div class="panel">模式 <div id="mode-text" style="color:#00f2ff; font-weight:bold;">READY</div></div>
    </div>

    <div id="msg">WIN!</div>

    <div id="left-box-wrapper">
        <div style="font-size: 0.7rem; color: #777; text-align: center; margin-bottom: 5px;">COLLECTION</div>
    </div>

    <div id="right-controls-wrapper">
        <div style="font-size: 0.7rem; color: #aaa; text-align: center;">BET</div>
        <input type="number" id="bet-input" value="1" min="1" max="99">
        <button id="start-btn" onclick="launch()">發射</button>
        <button id="reset-btn" onclick="resetGame()">重開</button>
    </div>
</div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Events, Body, Vector } = Matter;
const engine = Engine.create();
const world = engine.world;

// [修正] 自動偵測視窗大小
const canvasWidth = window.innerWidth;
const canvasHeight = window.innerHeight;

const render = Render.create({
    element: document.getElementById('game-container'),
    engine: engine,
    options: { width: canvasWidth, height: canvasHeight, wireframes: false, background: 'transparent' }
});

// --- 參數設定 ---
let balance = 10;
let isPlaying = false; 
const slotCount = 12; // 調整槽位數量以適配手機寬度
let boxBalls = [];

const marginY = canvasHeight * 0.1;
const boardHeight = canvasHeight * 0.75;
const boardTop = marginY;
const boardBottom = canvasHeight - marginY;
const boardCenterX = canvasWidth / 2;

// [修正] 根據手機寬度自動縮放盤面寬度 (最大不超過 360)
const boardWidth = Math.min(canvasWidth * 0.85, 360);

// --- 物理建構 ---
const wallStyle = { fillStyle: 'rgba(255,255,255,0.05)' };
const leftWall = Bodies.rectangle(boardCenterX - boardWidth/2, canvasHeight/2, 10, boardHeight, { isStatic: true, render: wallStyle });
const rightWall = Bodies.rectangle(boardCenterX + boardWidth/2, canvasHeight/2, 10, boardHeight, { isStatic: true, render: wallStyle });

// [修正] 收集盒位置隨螢幕調整
const boxX = (canvasWidth < 600) ? 30 : boardCenterX - boardWidth/2 - 130;
const boxY = boardBottom - 180;
const boxWalls = [
    Bodies.rectangle(boxX + 65, boxY + 110, 8, 150, { isStatic: true, render: { fillStyle: '#222' } }),
    Bodies.rectangle(boxX + 165, boxY + 110, 8, 150, { isStatic: true, render: { fillStyle: '#222' } }),
    Bodies.rectangle(boxX + 115, boxY + 185, 108, 8, { isStatic: true, render: { fillStyle: '#222' } })
];

const pegs = [];
const rows = 10;
const spacingY = (boardHeight - 150) / (rows - 1);
for (let r = 0; r < rows; r++) {
    const isEven = r % 2 === 0;
    const cols = isEven ? 7 : 6;
    const stepX = boardWidth / 7;
    const xStart = boardCenterX - boardWidth/2 + (isEven ? stepX/2 : stepX);
    for (let c = 0; c < cols; c++) {
        pegs.push(Bodies.circle(xStart + c * stepX, boardTop + 80 + r * spacingY, 4, {
            isStatic: true, restitution: 1.1, render: { fillStyle: '#444' }
        }));
    }
}

const bins = [];
const binWidth = boardWidth / slotCount;
for (let i = 0; i < slotCount; i++) {
    bins.push(Bodies.rectangle(boardCenterX - boardWidth/2 + i*binWidth + binWidth/2, boardBottom - 20, binWidth-2, 40, {
        isStatic: true, label: `bin_${i}`, render: { fillStyle: 'rgba(255,255,255,0.05)' }
    }));
}

Composite.add(world, [leftWall, rightWall, ...boxWalls, ...pegs, ...bins]);

// --- 邏輯功能 ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSFX(f, d=0.1, v=0.05) {
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.frequency.value = f; g.gain.value = v; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
}

function syncBox() {
    const visualNum = Math.min(balance, 50);
    while(boxBalls.length > visualNum) { Composite.remove(world, boxBalls.pop()); }
    while(boxBalls.length < visualNum) {
        const b = Bodies.circle(boxX + 80 + Math.random()*60, boxY + 50, 3.5, { restitution: 0.5, friction: 0.2, render: { fillStyle: '#f1c40f' }});
        boxBalls.push(b); Composite.add(world, b);
    }
    document.getElementById('balance-text').innerText = balance;
}

function launch() {
    if(isPlaying) return; 
    const bet = parseInt(document.getElementById('bet-input').value);
    if(bet < 1 || bet > 99) return alert("單次投入上限為 99 顆");
    if(balance < bet) return alert("彈珠不足");

    balance -= bet;
    isPlaying = true; 
    document.getElementById('start-btn').disabled = true;
    syncBox();

    const modes = [{m:2,c:4}, {m:2,c:4}, {m:4,c:3}, {m:6,c:2}, {m:8,c:1}];
    const mode = modes[Math.floor(Math.random()*modes.length)];
    let activeIndices = [];
    while(activeIndices.length < mode.c) {
        let r = Math.floor(Math.random()*slotCount);
        if(!activeIndices.includes(r)) activeIndices.push(r);
    }

    document.getElementById('mode-text').innerText = `${mode.m}X MODE`;
    bins.forEach((b, i) => {
        const active = activeIndices.includes(i);
        b.render.fillStyle = active ? 'rgba(255,255,0,0.5)' : 'rgba(255,255,255,0.05)';
        b.render.strokeStyle = active ? '#ff0' : 'transparent';
        b.render.lineWidth = active ? 2 : 0;
    });

    const ball = Bodies.circle(boardCenterX + (Math.random()*20-10), boardTop + 30, 8, {
        label: 'playerBall', restitution: 0.8, customData: { bet, mode: mode.m, activeIndices },
        render: { fillStyle: '#fff', strokeStyle: '#00f2ff', lineWidth: 2 }
    });
    Composite.add(world, ball);

    let lastPos = { x: ball.position.x, y: ball.position.y };
    let stayTime = 0;
    const monitor = setInterval(() => {
        if (!isPlaying || !Composite.allBodies(world).includes(ball)) { clearInterval(monitor); return; }
        const dist = Vector.magnitude(Vector.sub(ball.position, lastPos));
        if (dist < 0.5) stayTime += 100; else { stayTime = 0; lastPos = { x: ball.position.x, y: ball.position.y }; }
        if (stayTime >= 3000) { balance += ball.customData.bet; showMsg('卡球退回!', '#00f2ff'); endRound(ball); clearInterval(monitor); }
    }, 100);
}

Events.on(engine, 'collisionStart', (e) => {
    e.pairs.forEach(p => {
        const { bodyA, bodyB } = p;
        const ball = bodyA.label === 'playerBall' ? bodyA : (bodyB.label === 'playerBall' ? bodyB : null);
        const target = bodyA === ball ? bodyB : bodyA;
        if(ball && target.label && target.label.startsWith('bin_')) {
            const idx = parseInt(target.label.split('_')[1]);
            if(ball.customData.activeIndices.includes(idx)) {
                const win = ball.customData.bet * ball.customData.mode;
                balance += win; showMsg(`+${win}`, '#f1c40f'); playSFX(1000, 0.4, 0.15);
            } else { showMsg('MISS', '#666'); playSFX(200, 0.2, 0.1); }
            endRound(ball);
        } else if(ball && target.isStatic) { playSFX(800 + Math.random()*500, 0.05, 0.03); }
    });
});

function endRound(ball) {
    if(ball) Composite.remove(world, ball);
    isPlaying = false; 
    document.getElementById('start-btn').disabled = false;
    syncBox();
    if (balance <= 0) {
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'block';
    }
}

function showMsg(t, c) {
    const el = document.getElementById('msg');
    el.innerText = t; el.style.color = c; el.style.opacity = 1;
    setTimeout(() => el.style.opacity = 0, 1000);
}

function resetGame() {
    balance = 10;
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('reset-btn').style.display = 'none';
    syncBox();
}

Render.run(render);
Runner.run(Runner.create(), engine);
syncBox();
</script>
</body>
</html>
